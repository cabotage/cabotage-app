name: Publish
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
permissions:
  contents: write
  packages: write
jobs:
  release-to-ghcr:
    if: github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: release-to-ghcr-${{ matrix.config.arch }}-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
          - { os: ubuntu-24.04, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - name: Checkout Push to Registry action
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine tags
        id: tags
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          TAGS="ghcr.io/cabotage/cabotage-app:${SHA}-${{ matrix.config.arch }}"
          if [[ "$BRANCH" == "refs/tags/"* ]] || [[ "${{ github.event.workflow_run.event }}" == "push" && "$BRANCH" != "main" ]]; then
            TAGS="${TAGS},ghcr.io/cabotage/cabotage-app:${BRANCH}-${{ matrix.config.arch }}"
          fi
          if [[ "$BRANCH" == "main" ]]; then
            TAGS="${TAGS},ghcr.io/cabotage/cabotage-app:latest-${{ matrix.config.arch }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  create-manifests:
    runs-on: ubuntu-24.04-arm
    needs: [release-to-ghcr]

    steps:
    - name: Checkout Push to Registry action
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login To GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Create SHA manifest and push
      run: |
        SHA="${{ github.event.workflow_run.head_sha }}"
        docker buildx imagetools create \
          --tag ghcr.io/cabotage/cabotage-app:${SHA} \
          ghcr.io/cabotage/cabotage-app:${SHA}-amd64 \
          ghcr.io/cabotage/cabotage-app:${SHA}-arm64

    - name: Create tag manifest and push
      if: github.event.workflow_run.head_branch != 'main'
      run: |
        BRANCH="${{ github.event.workflow_run.head_branch }}"
        docker buildx imagetools create \
          --tag ghcr.io/cabotage/cabotage-app:${BRANCH} \
          ghcr.io/cabotage/cabotage-app:${BRANCH}-amd64 \
          ghcr.io/cabotage/cabotage-app:${BRANCH}-arm64

    - name: Create latest manifest and push
      if: github.event.workflow_run.head_branch == 'main'
      run: |
        docker buildx imagetools create \
          --tag ghcr.io/cabotage/cabotage-app:latest \
          ghcr.io/cabotage/cabotage-app:latest-amd64 \
          ghcr.io/cabotage/cabotage-app:latest-arm64
