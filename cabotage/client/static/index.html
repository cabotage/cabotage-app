<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f17" />
    <title>Cabotage - Platform as a Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --color-base-100: #0f0f17;
        --color-base-200: #16161f;
        --color-base-300: #1e1e2a;
        --color-base-content: #e2e2e9;
        --color-primary: #7c3aed;
        --color-primary-content: #ffffff;
        --border-color: rgba(255,255,255,0.06);
        --text-muted: rgba(226, 226, 233, 0.5);
        --text-faint: rgba(226, 226, 233, 0.4);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --color-base-100: #fafafe;
          --color-base-200: #f0f0f4;
          --color-base-300: #e4e4ea;
          --color-base-content: #1a1a2e;
          --color-primary: #7c3aed;
          --color-primary-content: #ffffff;
          --border-color: rgba(0,0,0,0.12);
          --text-muted: #52525b;
          --text-faint: #71717a;
        }
      }

      html { color-scheme: dark; }
      @media (prefers-color-scheme: light) { html { color-scheme: light; } }

      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        background: var(--color-base-100);
        color: var(--color-base-content);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      a { color: var(--color-primary); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        background: color-mix(in srgb, var(--color-base-100) 85%, transparent);
        border-bottom: 1px solid var(--border-color);
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .topbar-logo {
        width: 1.5rem;
        height: 1.5rem;
        color: var(--color-primary);
      }
      .topbar-title {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 4rem 1.5rem;
        background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 60%);
      }
      .hero-icon {
        padding: 0.75rem;
        border-radius: 1rem;
        background: rgba(124, 58, 237, 0.1);
        color: var(--color-primary);
        margin-bottom: 1.5rem;
      }
      .hero-icon svg {
        width: 5rem;
        height: 5rem;
        display: block;
      }
      .hero h1 {
        font-size: clamp(2.25rem, 5vw, 3rem);
        font-weight: 700;
        margin-bottom: 1rem;
        letter-spacing: -0.025em;
      }
      .hero p {
        font-size: 1.125rem;
        color: var(--text-muted);
        max-width: 32rem;
        line-height: 1.625;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.5rem;
        border: none;
        cursor: pointer;
        transition: all 0.15s ease;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--color-primary);
        color: var(--color-primary-content);
      }
      .btn-primary:hover {
        opacity: 0.9;
        text-decoration: none;
      }
      .btn-ghost {
        background: transparent;
        color: var(--color-base-content);
        border: 1px solid var(--border-color);
      }
      .btn-ghost:hover {
        background: rgba(124, 58, 237, 0.05);
        text-decoration: none;
      }
      .btn-group {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
        gap: 1.5rem;
        max-width: 56rem;
        width: 100%;
        margin: 0 auto;
        padding: 0 1.5rem 4rem;
      }
      .feature-card {
        background: var(--color-base-200);
        border: 1px solid var(--border-color);
        border-radius: 0.75rem;
        padding: 1.5rem;
      }
      .feature-card h3 {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .feature-card p {
        font-size: 0.8125rem;
        color: var(--text-faint);
        line-height: 1.5;
      }

      footer {
        border-top: 1px solid var(--border-color);
        padding: 1.5rem;
        text-align: center;
        font-size: 0.75rem;
        color: var(--text-faint);
      }
    </style>
  </head>
