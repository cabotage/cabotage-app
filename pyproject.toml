[project]
name = "cabotage"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "backoff",
    "bleach",
    "celery",
    "celery-redbeat",
    "cryptography",
    "dockerfile-parse",
    "flask",
    "flask-admin",
    "flask-babel",
    "flask-bcrypt",
    "flask-bootstrap",
    "flask-debugtoolbar",
    "flask-env",
    "flask-mail",
    "flask-migrate",
    "flask-nav3",
    "flask-security-too",
    "flask-sock",
    "flask-sqlalchemy",
    "gunicorn",
    "humanize",
    "hupper",
    "hvac",
    "kubernetes",
    "psycopg2",
    "py-consul",
    "pygithub",
    "pyjwt",
    "python-dxf",
    "qrcode",
    "redis",
    "sentry-sdk[flask]",
    "setuptools",
    "sqlalchemy",
    "sqlalchemy-citext",
    "sqlalchemy-continuum",
    "toml",
    "unidecode",
    "urllib3",
]

[dependency-groups]
dev = [
    "bandit",
    "black",
    "mypy",
    "ruff",
    "sqlalchemy-stubs",
    "types-PyYAML",
    "types-redis",
    "types-requests",
    "types-toml",
    "typing-extensions==4.7.1",
    "urllib3==2.2.2",
]

[tool.bandit]
exclude_dirs = ["bin", "lib"]

[tool.mypy]
ignore_missing_imports = true
